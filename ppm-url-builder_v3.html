<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parlay Module Link Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --white:        #ffffff;
    --white-80:     rgba(255,255,255,0.8);
    --white-50:     rgba(255,255,255,0.5);
    --white-20:     rgba(255,255,255,0.2);
    --white-10:     rgba(255,255,255,0.1);
    --white-06:     rgba(255,255,255,0.06);
    --red:          #e05252;
    --red-dim:      rgba(224,82,82,0.15);
    --green:        #3ecf8e;
  }

  body {
    background: linear-gradient(160deg, #1a6ff5 0%, #1255c2 25%, #0d3e99 50%, #082d75 75%, #061e52 100%);
    background-attachment: fixed;
    color: var(--white);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding: 44px 20px 70px;
  }

  .container { max-width: 800px; margin: 0 auto; }

  header { text-align: center; margin-bottom: 44px; }

  .logo-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-bottom: 10px;
  }

  .fd-logo {
    height: 44px;
    width: auto;
    flex-shrink: 0;
    filter: brightness(0) invert(1);
  }

  .header-divider {
    width: 1px;
    height: 44px;
    background: rgba(255,255,255,0.25);
    flex-shrink: 0;
    margin-left: -15px;
  }

  h1 {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 30px;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: var(--white);
  }

  .subtitle {
    font-size: 10.5px;
    color: var(--white-50);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .leg-control {
    background: rgba(255,255,255,0.07);
    border: 1px solid var(--white-20);
    border-radius: 12px;
    backdrop-filter: blur(4px);
    padding: 20px 26px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .leg-control label {
    font-family: 'Oswald', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--white-50);
    flex-shrink: 0;
  }

  .leg-buttons { display: flex; gap: 6px; }

  .leg-btn {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    border: 1px solid var(--white-20);
    background: transparent;
    color: var(--white-50);
    font-family: 'Oswald', sans-serif;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .leg-btn:hover {
    border-color: var(--white-80);
    color: var(--white);
    background: var(--white-10);
  }

  .leg-btn.active {
    background: var(--white);
    border-color: var(--white);
    color: #1a6ff5;
    font-weight: 700;
    box-shadow: 0 2px 16px rgba(255,255,255,0.25);
  }

  .legs-wrapper {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 20px;
  }

  .leg-row {
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--white-10);
    border-radius: 12px;
    padding: 16px 22px;
    display: grid;
    grid-template-columns: 52px 1fr 1fr;
    gap: 14px;
    align-items: start;
    transition: border-color 0.2s, background 0.2s;
    animation: fadeIn 0.18s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-5px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .leg-row:focus-within {
    border-color: rgba(255,255,255,0.35);
    background: rgba(255,255,255,0.1);
  }

  .leg-row.has-error {
    border-color: rgba(224,82,82,0.7) !important;
    background: rgba(224,82,82,0.06) !important;
  }

  .leg-number {
    font-family: 'Oswald', sans-serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--white);
    text-align: center;
    line-height: 1;
    padding-top: 22px;
  }

  .leg-number span {
    display: block;
    font-size: 9px;
    font-weight: 400;
    color: var(--white-50);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 3px;
    font-family: 'DM Mono', monospace;
  }

  .field-group { display: flex; flex-direction: column; gap: 5px; }

  .field-label {
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--white-50);
  }

  .field-input {
    background: rgba(255,255,255,0.08);
    border: 1px solid var(--white-20);
    border-radius: 7px;
    padding: 10px 13px;
    color: var(--white);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    width: 100%;
    transition: border-color 0.15s, background 0.15s;
    outline: none;
  }

  .field-input::placeholder { color: rgba(255,255,255,0.2); }

  .field-input:focus {
    border-color: rgba(255,255,255,0.6);
    background: rgba(255,255,255,0.13);
  }

  .field-input.has-value {
    border-color: rgba(62,207,142,0.55);
    color: #7effd4;
  }

  .field-input.is-invalid {
    border-color: var(--red) !important;
    background: var(--red-dim) !important;
    color: #ff9a9a !important;
  }

  .field-input.is-duplicate {
    border-color: var(--red) !important;
    background: var(--red-dim) !important;
    color: #ff9a9a !important;
  }

  .inline-err {
    font-size: 10px;
    color: #ff9a9a;
    margin-top: 4px;
    letter-spacing: 0.04em;
  }

  .error-badge {
    display: none;
    grid-column: 1 / -1;
    background: rgba(224,82,82,0.12);
    border: 1px solid rgba(224,82,82,0.45);
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 11px;
    color: #ff9a9a;
    letter-spacing: 0.06em;
    font-weight: 500;
  }

  .error-badge.visible { display: block; }

  .output-section {
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--white-10);
    border-radius: 12px;
    overflow: hidden;
  }

  .output-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 22px;
    border-bottom: 1px solid var(--white-10);
    background: rgba(255,255,255,0.05);
  }

  .output-label {
    font-family: 'Oswald', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--white-50);
    display: flex;
    align-items: center;
    gap: 9px;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--white-20);
    transition: background 0.3s, box-shadow 0.3s;
    flex-shrink: 0;
  }

  .status-dot.ready   { background: var(--green);  box-shadow: 0 0 7px var(--green); }
  .status-dot.partial { background: #f0c040; }
  .status-dot.error   { background: var(--red);    box-shadow: 0 0 7px var(--red); }

  .copy-btn {
    background: var(--white);
    color: #1a6ff5;
    border: none;
    border-radius: 7px;
    padding: 9px 20px;
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  }

  .copy-btn:hover {
    background: #e8f0ff;
    box-shadow: 0 4px 20px rgba(255,255,255,0.3);
    transform: translateY(-1px);
  }

  .copy-btn:disabled {
    background: var(--white-20);
    color: var(--white-50);
    cursor: not-allowed;
    box-shadow: none;
    transform: none;
  }

  .copy-btn.copied { background: var(--green); color: #061e52; }

  .url-display {
    padding: 18px 22px;
    font-size: 11.5px;
    line-height: 1.75;
    word-break: break-all;
    color: var(--white-50);
    min-height: 76px;
    font-family: 'DM Mono', monospace;
  }

  .url-display.has-url { color: var(--white-80); }

  .url-base    { color: #7ab8ff; }
  .url-key     { color: var(--white-50); }
  .url-val     { color: var(--white); font-weight: 500; }
  .url-sep     { color: var(--white-20); }
  .url-missing { color: var(--red); background: rgba(224,82,82,0.12); border-radius: 3px; padding: 0 3px; }

  .actions-row {
    display: flex;
    justify-content: flex-end;
    margin-top: 12px;
  }

  .clear-btn {
    background: none;
    border: 1px solid var(--white-20);
    border-radius: 7px;
    padding: 8px 18px;
    font-family: 'Oswald', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--white-50);
    cursor: pointer;
    transition: all 0.15s;
  }

  .clear-btn:hover {
    border-color: rgba(224,82,82,0.6);
    color: #ff9a9a;
    background: rgba(224,82,82,0.08);
  }

  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--green);
    color: #061e52;
    font-family: 'Oswald', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 12px 32px;
    border-radius: 9px;
    opacity: 0;
    transition: all 0.25s;
    pointer-events: none;
    z-index: 100;
    box-shadow: 0 4px 28px rgba(62,207,142,0.45);
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>

      <div class="header-divider"></div>
      <h1>Parlay Module Link Builder</h1>
    </div>
    <p class="subtitle">URL Generator for Push Notifications</p>
  </header>

  <div class="leg-control">
    <label>Legs</label>
    <div class="leg-buttons" id="legButtons"></div>
  </div>

  <div class="legs-wrapper" id="legsWrapper"></div>

  <div class="output-section">
    <div class="output-header">
      <div class="output-label">
        <div class="status-dot" id="statusDot"></div>
        Generated URL
      </div>
      <button class="copy-btn" id="copyBtn" onclick="copyUrl()" disabled>Copy URL</button>
    </div>
    <div class="url-display" id="urlDisplay">Enter IDs above to generate your betslip URL.</div>
  </div>

  <div class="actions-row">
    <button class="clear-btn" onclick="clearAll()">Clear All</button>
  </div>

</div>

<div class="toast" id="toast">✓ URL Copied!</div>

<script>
  const BASE = 'https://sportsbook.fanduel.com/addToBetslip?';
  let legCount = 4;

  const legButtonsEl = document.getElementById('legButtons');
  for (let i = 2; i <= 7; i++) {
    const btn = document.createElement('button');
    btn.className = 'leg-btn' + (i === legCount ? ' active' : '');
    btn.textContent = i;
    btn.dataset.legs = i;
    btn.onclick = () => setLegs(i);
    legButtonsEl.appendChild(btn);
  }

  function setLegs(n) {
    legCount = n;
    document.querySelectorAll('.leg-btn').forEach(b =>
      b.classList.toggle('active', parseInt(b.dataset.legs) === n)
    );
    renderLegs();
  }

  function validateMarket(val) {
    if (!val) return null;
    if (!/^[0-9.]+$/.test(val)) return 'Error: Do not include letters or special characters';
    if (!val.startsWith('42.')) return 'Error: externalMarketId needs to begin with "42."';
    return null;
  }

  function validateSelection(val) {
    if (!val) return null;
    if (!/^\d+$/.test(val)) return 'Error: selectionId must contain only numbers';
    return null;
  }

  function applyFieldValidation(inp) {
    const val = inp.value.trim();
    const isMarket = inp.classList.contains('market-input');
    const err = isMarket ? validateMarket(val) : validateSelection(val);
    const prevErr = inp.parentElement.querySelector('.inline-err');
    if (prevErr) prevErr.remove();
    inp.classList.remove('is-invalid', 'has-value');
    if (err) {
      inp.classList.add('is-invalid');
      const errEl = document.createElement('div');
      errEl.className = 'inline-err';
      errEl.textContent = err;
      inp.parentElement.appendChild(errEl);
    } else if (val) {
      inp.classList.add('has-value');
    }
  }

  function renderLegs() {
    const wrapper = document.getElementById('legsWrapper');
    const existing = {};
    wrapper.querySelectorAll('.leg-row').forEach(row => {
      existing[row.dataset.idx] = {
        market: row.querySelector('.market-input').value,
        selection: row.querySelector('.selection-input').value
      };
    });
    wrapper.innerHTML = '';
    for (let i = 0; i < legCount; i++) {
      const row = document.createElement('div');
      row.className = 'leg-row';
      row.dataset.idx = i;
      row.innerHTML = `
        <div class="leg-number">${i + 1}<span>LEG</span></div>
        <div class="field-group">
          <div class="field-label">External Market ID</div>
          <input class="field-input market-input" type="text" placeholder="" autocomplete="off" spellcheck="false">
        </div>
        <div class="field-group">
          <div class="field-label">Selection ID</div>
          <input class="field-input selection-input" type="text" placeholder="" autocomplete="off" spellcheck="false">
        </div>
        <div class="error-badge" id="err-${i}">&#9888; Error: Duplicate Leg</div>
      `;
      if (existing[i]) {
        row.querySelector('.market-input').value = existing[i].market;
        row.querySelector('.selection-input').value = existing[i].selection;
      }
      row.querySelectorAll('.field-input').forEach(inp => {
        inp.addEventListener('input', () => { applyFieldValidation(inp); buildUrl(); });
        if (existing[i]) applyFieldValidation(inp);
      });
      wrapper.appendChild(row);
    }
    buildUrl();
  }

  function getDuplicateIndices(params) {
    const seen = {}, dupes = new Set();
    params.forEach(({ market, selection }, i) => {
      if (!market || !selection) return;
      const key = market + '||' + selection;
      if (seen[key] !== undefined) { dupes.add(seen[key]); dupes.add(i); }
      else seen[key] = i;
    });
    return dupes;
  }

  function buildUrl() {
    const rows = document.querySelectorAll('.leg-row');
    const params = [];
    rows.forEach((row, i) => {
      params.push({
        market: row.querySelector('.market-input').value.trim(),
        selection: row.querySelector('.selection-input').value.trim(),
        idx: i
      });
    });

    const dupeIndices = getDuplicateIndices(params);
    let allFilled = true, anyFilled = false, hasValidationError = false;

    rows.forEach((row, i) => {
      const mInp = row.querySelector('.market-input');
      const sInp = row.querySelector('.selection-input');
      const errBadge = document.getElementById('err-' + i);
      const { market, selection } = params[i];
      if (market || selection) anyFilled = true;
      if (!market || !selection) allFilled = false;
      if (validateMarket(market) || validateSelection(selection)) hasValidationError = true;
      if (dupeIndices.has(i)) {
        row.classList.add('has-error');
        if (!mInp.classList.contains('is-invalid')) { mInp.classList.add('is-duplicate'); mInp.classList.remove('has-value'); }
        if (!sInp.classList.contains('is-invalid')) { sInp.classList.add('is-duplicate'); sInp.classList.remove('has-value'); }
        errBadge.classList.add('visible');
      } else {
        row.classList.remove('has-error');
        mInp.classList.remove('is-duplicate');
        sInp.classList.remove('is-duplicate');
        errBadge.classList.remove('visible');
      }
    });

    const dot = document.getElementById('statusDot');
    const copyBtn = document.getElementById('copyBtn');
    const urlDisplay = document.getElementById('urlDisplay');
    const hasDupes = dupeIndices.size > 0;

    if (!anyFilled) {
      dot.className = 'status-dot';
      copyBtn.disabled = true;
      urlDisplay.className = 'url-display';
      urlDisplay.innerHTML = 'Enter IDs above to generate your betslip URL.';
      return;
    }

    let rawUrl = BASE;
    const htmlParts = [];
    params.forEach(({ market, selection, idx }) => {
      const mD = market || '<span class="url-missing">EXT_MARKET_ID</span>';
      const sD = selection || '<span class="url-missing">SELECTION_ID</span>';
      rawUrl += (idx > 0 ? '&' : '') + 'marketId[' + idx + ']=' + (market||'MISSING') + '&selectionId[' + idx + ']=' + (selection||'MISSING');
      htmlParts.push(
        '<span class="url-key">marketId[' + idx + ']</span><span class="url-sep">=</span><span class="url-val">' + mD + '</span>' +
        '<span class="url-sep">&amp;</span>' +
        '<span class="url-key">selectionId[' + idx + ']</span><span class="url-sep">=</span><span class="url-val">' + sD + '</span>'
      );
    });

    urlDisplay.className = 'url-display has-url';
    urlDisplay.innerHTML = '<span class="url-base">https://sportsbook.fanduel.com/addToBetslip</span><span class="url-sep">?</span>' +
      htmlParts.join('<span class="url-sep">&amp;</span>');

    if (allFilled && !hasDupes && !hasValidationError) {
      dot.className = 'status-dot ready';
      copyBtn.disabled = false;
      copyBtn.dataset.url = rawUrl;
    } else if (hasDupes || hasValidationError) {
      dot.className = 'status-dot error';
      copyBtn.disabled = true;
    } else {
      dot.className = 'status-dot partial';
      copyBtn.disabled = true;
    }
  }

  function copyUrl() {
    const url = document.getElementById('copyBtn').dataset.url;
    if (!url) return;
    navigator.clipboard.writeText(url).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = '✓ Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy URL'; btn.classList.remove('copied'); }, 2000);
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    });
  }

  function clearAll() {
    document.querySelectorAll('.field-input').forEach(inp => {
      inp.value = '';
      inp.classList.remove('has-value', 'is-duplicate', 'is-invalid');
      const prevErr = inp.parentElement.querySelector('.inline-err');
      if (prevErr) prevErr.remove();
    });
    document.querySelectorAll('.leg-row').forEach(r => r.classList.remove('has-error'));
    document.querySelectorAll('.error-badge').forEach(b => b.classList.remove('visible'));
    buildUrl();
  }

  renderLegs();
</script>
</body>
</html>
